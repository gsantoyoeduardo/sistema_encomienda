{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-shipping-fast fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold">Sistema de Encomiendas</h3>
                    <p class="text-muted">Inicia sesión para continuar</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    Usuario o contraseña incorrectos. Intenta nuevamente.
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">
                            <i class="fas fa-user me-1"></i>Usuario
                        </label>
                        <input type="text" name="username" id="{{ form.username.id_for_label }}"
                               class="form-control {% if form.username.errors %}is-invalid{% endif %}"
                               placeholder="Ingresa tu usuario" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="{{ form.password.id_for_label }}" class="form-label">
                            <i class="fas fa-lock me-1"></i>Contraseña
                        </label>
                        <input type="password" name="password" id="{{ form.password.id_for_label }}"
                               class="form-control {% if form.password.errors %}is-invalid{% endif %}"
                               placeholder="Ingresa tu contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-1"></i>Iniciar Sesión
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
