version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: encomienda_db
      POSTGRES_USER: encomienda_user
      POSTGRES_PASSWORD: encomienda2026kazel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encomienda_user -d encomienda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=lNaaxSyRNpbziP0iFE8@&2M#hn=3efAhs5eo$sToxCedXww^$O
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_NAME=encomienda_db
      - DB_USER=encomienda_user
      - DB_PASSWORD=encomienda2026kazel
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
