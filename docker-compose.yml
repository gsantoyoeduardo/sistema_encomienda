version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: encomienda_db
      POSTGRES_USER: encomienda_user
      POSTGRES_PASSWORD: encomienda2026kazel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encomienda_user -d encomienda_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - encomienda_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - encomienda_network

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 sistema_encomiendas.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=lNaaxSyRNpbziP0iFE8@&2M#hn=3efAhs5eo$sToxCedXww^$O
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_NAME=encomienda_db
      - DB_USER=encomienda_user
      - DB_PASSWORD=encomienda2026kazel
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - encomienda_network

volumes:
  postgres_data:

networks:
  encomienda_network:
    driver: bridge
